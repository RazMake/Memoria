id: "individual-contributor"
name: "Individual Contributor Notebook"
description: "A personal knowledge base for developers and PMs."
version: "1.0.0"

workspace:
  - name: "00-ToDo/"
    children:
      - name: "Main.todo"
  - name: "01-ToRemember/"
  - name: "02-MeetingNotes/"
  - name: "03-Inbox/"
  - name: "04-Archive/"

features:
  - id: "decorations"
    name: "Explorer Decorations"
    description: "Badges and colors in the VS Code Explorer"
    enabledByDefault: true
    rules:
      - filter: "00-ToDo/"
        color: "charts.yellow"
        badge: "TD"
        tooltip: "Active tasks"
        propagate: true
      - filter: "04-Archive/"
        color: "charts.grey"
        tooltip: "Archived items"
