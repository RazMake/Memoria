id: "individual-contributor"
name: "Individual Contributor Notebook"
description: "A personal knowledge base for developers and PMs."
version: "1.0.0"

workspace:
  - name: ".github/"
    children:
    - name: "agents/"
      children:
        - name: "WorkIQ.agent.md"
          seedSource: "ai-instruction-files/agents/WorkIQ.agent.md"
    - name: "prompts/"
      children:
        - name: "initialize-career-data-types.prompt.md"
        - name: "initialize-contacts.prompt.md"
        - name: "install-workiq-mcp.prompt.md"
          seedSource: "ai-instruction-files/prompts/install-workiq-mcp.prompt.md"
  - name: "00-Workstreams/"
    children:
      - name: "Dev-Designs/"
      - name: "All.todo.md"
        default: "relative"
        seedSource: "workstreams/All.todo.md"
  - name: "01-ToRemember/"
    children:
      - name: "Trainings/"
  - name: "02-MeetingNotes/"
    children:
      - name: "1-1"
  - name: "03-Inbox/"
  - name: "04-Archive/"
  - name: "05-Autocomplete/"
    children:
      - name: "Contacts/"
        children:
          - name: "Peers.md"
            seedSource: "contacts/Peers.md"
          - name: "Colleagues.md"
            seedSource: "contacts/Colleagues.md"
          - name: "InterviewTemplates/"
          - name: "DataTypes/"
            children:
              - name: "CareerLevels.md"
                seedSource: "contacts/DataTypes/CareerLevels.md"
              - name: "CareerPaths.md"
                seedSource: "contacts/DataTypes/CareerPaths.md"
              - name: "InterviewTypes.md"
                seedSource: "contacts/DataTypes/InterviewTypes.md"
              - name: "Pronouns.md"
                seedSource: "contacts/DataTypes/Pronouns.md"
      - name: "Snippets/"
        children:
          - name: "date-time.ts"
            seedSource: "snippets/date-time.ts"
          - name: "heading-children.ts"
            seedSource: "snippets/heading-children.ts"

features:
  - id: "taskCollector"
    name: "Task Collector"
    description: "Aggregate and sync tasks from markdown files in the workspace into a single place."
    enabledByDefault: true
    collectorPath: "00-Workstreams/All.todo.md"
  - id: "contacts"
    name: "Contacts"
    description: "Browse, search, and manage colleagues."
    enabledByDefault: true
    peopleFolder: "05-Autocomplete/Contacts/"
    groups:
      - file: "Peers.md"
        type: "colleague"
      - file: "Colleagues.md"
        type: "colleague"
  - id: "snippets"
    name: "Snippets"
    description: "Text expansion for Markdown files via autocomplete."
    enabledByDefault: true
    snippetsFolder: "05-Autocomplete/Snippets"
  - id: "decorations"
    name: "Explorer Decorations"
    description: "Badges and colors in the VS Code Explorer"
    enabledByDefault: true
    rules:
      - filter: ".*/"
        color: "terminal.ansiBrightBlack"
      - filter: "05-Autocomplete/Snippets/"
        color: "terminal.ansiCyan"
        badge: "✂️"
        tooltip: "User-defined text expansion snippets."
        propagate: true
      - filter: "Dev-Designs/"
        color: "charts.purple"
        badge: "🪛"
        tooltip: "Dev design documents, grouped by quarter."
        propagate: true
      - filter: "00-Workstreams/"
        color: "terminal.ansiMagenta"
        badge: "📋"
        tooltip: "Information about current workstreams, todos, etc."
        propagate: true
      - filter: "01-ToRemember/"
        color: "charts.yellow"
        badge: "🧠"
        tooltip: "Personal knowledge base."
        propagate: true
      - filter: "02-MeetingNotes/"
        color: "terminal.ansiBrightYellow"
        tooltip: "Meeting notes to be preserved for later references."
        propagate: true
      - filter: "03-Inbox/"
        color: "charts.red"
        badge: "📭"
        tooltip: "New, unprocessed notes."
        propagate: true
      - filter: "04-Archive/"
        color: "terminal.ansiBrightBlack"
        badge: "⌛"
        tooltip: "Notes/information that is considered obsolete, but the user decided to keep it around for a bit longer."
        propagate: true
      - filter: "05-Autocomplete/Contacts/DataTypes/"
        color: "terminal.ansiBlue"
        badge: "🔨"
        tooltip: "Data types used in contact definitions."
        propagate: true
      - filter: "05-Autocomplete/Contacts/InterviewTemplates/"
        color: "terminal.ansiRed"
        badge: "📋"
        tooltip: "Problems that can be used in an interview."
        propagate: true
      - filter: "05-Autocomplete/Contacts/"
        color: "terminal.ansiGreen"
        badge: "👤"
        tooltip: "Known contacts information, available in this workspace."
        propagate: true
      - filter: "05-Autocomplete/"
        color: "terminal.ansiBrightBlack"
        badge: "🤖"
        tooltip: "Autocomplete features: contacts, snippets, and more."
        propagate: true
      - filter: "WorkspaceInitializationBackups/"
        color: "terminal.ansiBrightBlack"
        tooltip: "Backup of files that existed before the scaffolding of the workspace."
        propagate: true

