id: "people-manager"
name: "People Manager Notebook"
description: "For managers: meeting notes, 1:1s, team contacts, and project status."
version: "1.2.0"

workspace:
  - name: ".github/"
    children:
    - name: "agents/"
      children:
        - name: "WorkIQ.agent.md"
          seedSource: "ai-instruction-files/agents/WorkIQ.agent.md"
    - name: "instructions/"
    - name: "prompts/"
      children:
        - name: "contacts-update.prompt.md"
    - name: "skills/"
  - name: "00-Workstreams/"
    children:
      - name: "My-Evaluation/"
      - name: "All.todo.md"
        default: "includingRoot"
        seedSource: "workstreams/All.todo.md"
  - name: "01-Planning/"
  - name: "02-Team-Evaluations/"
  - name: "03-MeetingNotes/"
  - name: "04-Inbox/"
  - name: "05-ToRemember/"
    children:
      - name: "Trainings/"
      - name: "Hiring/"
      - name: "Evaluation/"
        children:
          - name: "Expectations/"
  - name: "06-Archive/"
  - name: "10-Autocomplete/"
    children:
      - name: "Contacts/"
        children:
          - name: "Me.md"
            seedSource: "contacts/Me.md"
          - name: "Team.md"
            seedSource: "contacts/Team.md"
          - name: "Colleagues.md"
            seedSource: "contacts/Colleagues.md"
          - name: "Peers.md"
            seedSource: "contacts/Peers.md"
          - name: "Management.md"
          - name: "DataTypes/"
            children:
              - name: "CareerLevels.md"
                seedSource: "contacts/DataTypes/CareerLevels.md"
              - name: "CareerPaths.md"
                seedSource: "contacts/DataTypes/CareerPaths.md"
              - name: "ImpactLevels.md"
              - name: "InterviewTypes.md"
                seedSource: "contacts/DataTypes/InterviewTypes.md"
              - name: "Pronouns.md"
                seedSource: "contacts/DataTypes/Pronouns.md"
      - name: "Snippets/"
        children:
          - name: "date-time.ts"
            seedSource: "snippets/date-time.ts"
          - name: "heading-children.ts"
            seedSource: "snippets/heading-children.ts"
  - name: "11-Templates/"
    children:
      - name: "Interview/"
      - name: "Notes/"
      - name: "People-Related/"
  - name: "12-Settings/"
    children:
      - name: "Setup/"
  - name: "13-Scripts/"
    children:
      - name: "Communication/"
      - name: "People-Management/"
      - name: "Utils/"
        children:
          - name: "Invoke-Template.ps1"
            seedSource: "scripts/Invoke-Template.ps1"

features:
  - id: "taskCollector"
    name: "Task Collector"
    description: "Aggregate and sync tasks from markdown files in the workspace into a single place."
    enabledByDefault: true
    collectorPath: "00-Workstreams/All.todo.md"
  - id: "contacts"
    name: "Contacts"
    description: "Browse, search, and manage reports and colleagues."
    enabledByDefault: true
    peopleFolder: "10-Autocomplete/Contacts/"
    groups:
      - file: "Team.md"
        type: "report"
      - file: "Peers.md"
        type: "colleague"
      - file: "Colleagues.md"
        type: "colleague"
      - file: "Management.md"
        type: "colleague"
  - id: "snippets"
    name: "Snippets"
    description: "Text expansion for Markdown files via autocomplete."
    enabledByDefault: true
    snippetsFolder: "10-Autocomplete/Snippets"
    templatesFolder: "11-Templates"
  - id: "backup"
    name: "Scheduled Backup"
    description: "Schedule and run zipped backups of workspace files to a target folder."
    enabledByDefault: true
  - id: "decorations"
    name: "Explorer Decorations"
    description: "Badges and colors in the VS Code Explorer"
    enabledByDefault: true
    rules:
      - filter: ".*/"
        color: "terminal.ansiBrightBlack"
      - filter: "00-Workstreams/"
        color: "terminal.ansiMagenta"
        badge: "📋"
        tooltip: "Information about current workstreams, todos, etc."
        propagate: true
      - filter: "01-Planning/"
        color: "charts.purple"
        badge: "📅"
        tooltip: "Planning notes, by quarter."
        propagate: true
      - filter: "02-Team-Evaluations/"
        color: "terminal.ansiBrightCyan"
        badge: "✏️"
        tooltip: "Team continuous evaluation notes."
        propagate: true
      - filter: "03-MeetingNotes/"
        color: "charts.green"
        tooltip: "Meeting notes to be preserved for later references."
        propagate: true
      - filter: "04-Inbox/"
        color: "charts.red"
        badge: "📭"
        tooltip: "New, unprocessed notes."
        propagate: true
      - filter: "05-ToRemember/"
        color: "terminal.ansiBrightYellow"
        badge: "🧠"
        tooltip: "Personal knowledge base."
        propagate: true
      - filter: "06-Archive/"
        color: "terminal.ansiBrightBlack"
        tooltip: "Notes from previous years."
        propagate: true
      - filter: "10-Autocomplete/Contacts/DataTypes/"
        color: "terminal.ansiBlue"
        badge: "🔨"
        tooltip: "Data types used in contact definitions."
        propagate: true
      - filter: "10-Autocomplete/Contacts/Team.md"
        color: "terminal.ansiGreen"
        badge: "👤"
        tooltip: "Known contacts information, available in this workspace."
        propagate: true
      - filter: "10-Autocomplete/Snippets/"
        color: "terminal.ansiCyan"
        badge: "✂️"
        tooltip: "User-defined text expansion snippets."
        propagate: true
      - filter: "10-Autocomplete/"
        color: "terminal.ansiBrightBlack"
        badge: "🤖"
        tooltip: "Autocomplete features: contacts, snippets, and more."
        propagate: true
      - filter: "11-Templates/"
        color: "terminal.ansiBrightBlack"
        badge: "🤖"
        tooltip: "Autocomplete features: contacts, snippets, and more."
        propagate: true
      - filter: "12-Settings/"
        color: "terminal.ansiBrightBlack"
        badge: "🤖"
        tooltip: "Various settings files."
        propagate: true
      - filter: "13-Scripts/"
        color: "terminal.ansiBrightBlack"
        badge: "🤖"
        tooltip: "Script files used in the workspace, even by skills."
        propagate: true
      - filter: "WorkspaceInitializationBackups/"
        color: "terminal.ansiBrightBlack"
        tooltip: "Backup of files from the previous scaffolding."
        propagate: true
