id: "people-manager"
name: "People Manager Notebook"
description: "For managers: meeting notes, 1:1s, team contacts, and project status."
version: "1.0.0"

workspace:
  - name: "00-Workstreams/"
    children:
      - name: "Planning/"
      - name: "Team-Evaluations/"
      - name: "All.todo.md"
        default: "includingRoot"
  - name: "01-ToRemember/"
    children:
      - name: "Trainings/"
      - name: "Hiring/"
      - name: "Evaluation/"
  - name: "02-MeetingNotes/"
    children:
      - name: "Team-Members-1-1/"
  - name: "03-Inbox/"
  - name: "05-Archive/"
  - name: "06-Autocomplete/"
    children:
      - name: "Contacts/"
        children:
          - name: "Team.md"
          - name: "Colleagues.md"
          - name: "InterviewTemplates/"
          - name: "DataTypes/"
            children:
              - name: "CareerLevels.md"
              - name: "CareerPaths.md"
              - name: "InterviewTypes.md"
              - name: "Pronouns.md"
      - name: "Snippets/"
        children:
          - name: "date-time.ts"
          - name: "heading-children.ts"

features:
  - id: "taskCollector"
    name: "Task Collector"
    description: "Aggregate and sync tasks from markdown files in the workspace into a single place."
    enabledByDefault: true
    collectorPath: "00-Workstreams/All.todo.md"
  - id: "contacts"
    name: "Contacts"
    description: "Browse, search, and manage reports and colleagues."
    enabledByDefault: true
    peopleFolder: "06-Autocomplete/Contacts/"
    groups:
      - file: "Team.md"
        type: "report"
      - file: "Colleagues.md"
        type: "colleague"
  - id: "snippets"
    name: "Snippets"
    description: "Text expansion for Markdown files via autocomplete."
    enabledByDefault: true
    snippetsFolder: "06-Autocomplete/Snippets"
  - id: "decorations"
    name: "Explorer Decorations"
    description: "Badges and colors in the VS Code Explorer"
    enabledByDefault: true
    rules:
      - filter: ".*/"
        color: "terminal.ansiBrightBlack"
      - filter: "06-Autocomplete/Snippets/"
        color: "terminal.ansiCyan"
        badge: "✂️"
        tooltip: "User-defined text expansion snippets."
        propagate: true
      - filter: "Planning/"
        color: "charts.purple"
        badge: "📅"
        tooltip: "Planning notes, by quarter."
        propagate: true
      - filter: "Team-Evaluations/"
        color: "terminal.ansiBrightCyan"
        badge: "✏️"
        tooltip: "Team continuous evaluation notes."
        propagate: true
      - filter: "00-Workstreams/"
        color: "terminal.ansiMagenta"
        badge: "📋"
        tooltip: "Information about current workstreams, todos, etc."
        propagate: true
      - filter: "Hiring/"
        color: "charts.yellow"
        tooltip: "Notes on the hiring process, with examples."
        propagate: true
      - filter: "Evaluation/"
        color: "gitDecoration.modifiedResourceForeground"
        tooltip: "Details and templates used for team members' evaluation."
        propagate: true
      - filter: "01-ToRemember/"
        color: "terminal.ansiBrightYellow"
        badge: "🧠"
        tooltip: "Personal knowledge base."
        propagate: true
      - filter: "Team-Members-1-1/"
        color: "gitDecoration.submoduleResourceForeground"
        tooltip: "Notes from 1:1 meetings with team members."
        propagate: true
      - filter: "02-MeetingNotes/"
        color: "charts.green"
        tooltip: "Meeting notes to be preserved for later references."
        propagate: true
      - filter: "03-Inbox/"
        color: "charts.red"
        badge: "📭"
        tooltip: "New, unprocessed notes."
        propagate: true
      - filter: "05-Archive/"
        color: "terminal.ansiBrightBlack"
        badge: "⌛"
        tooltip: "Notes/information that is considered obsolete, but the user decided to keep it around for a bit longer."
        propagate: true
      - filter: "06-Autocomplete/Contacts/DataTypes/"
        color: "terminal.ansiBlue"
        badge: "🔨"
        tooltip: "Data types used in contact definitions."
        propagate: true
      - filter: "06-Autocomplete/Contacts/InterviewTemplates/"
        color: "terminal.ansiRed"
        badge: "📋"
        tooltip: "Problems that can be used in an interview."
        propagate: true
      - filter: "06-Autocomplete/Contacts/"
        color: "terminal.ansiGreen"
        badge: "👤"
        tooltip: "Known contacts information, available in this workspace."
        propagate: true
      - filter: "06-Autocomplete/"
        color: "terminal.ansiBrightBlack"
        badge: "🤖"
        tooltip: "Autocomplete features: contacts, snippets, and more."
        propagate: true
      - filter: "WorkspaceInitializationBackups/"
        color: "terminal.ansiBrightBlack"
        tooltip: "Backup of files from the previous scaffolding."
        propagate: true
