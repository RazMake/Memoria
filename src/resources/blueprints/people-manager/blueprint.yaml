id: "people-manager"
name: "People Manager Notebook"
description: "For managers: meeting notes, 1:1s, team contacts, and project status."
version: "1.0.0"

workspace:
  - name: "00-ToDo/"
    children:
      - name: "Main.todo"
  - name: "01-People/"
  - name: "02-ToRemember/"
  - name: "03-MeetingNotes/"
    children:
      - name: "1-1/"
      - name: "Ad-hoc/"
      - name: "WOR/"
  - name: "04-Inbox/"
  - name: "05-Archive/"

features:
  - id: "decorations"
    name: "Explorer Decorations"
    description: "Badges and colors in the VS Code Explorer"
    enabledByDefault: true
    rules:
      - filter: "00-ToDo/"
        color: "charts.yellow"
        badge: "TD"
        tooltip: "Active tasks"
        propagate: true
      - filter: "01-People/"
        color: "charts.blue"
        tooltip: "Team members"
        propagate: true
      - filter: "05-Archive/"
        color: "charts.grey"
        tooltip: "Archived items"
